{{template "base.html" .}}

{{define "content"}}
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
    <div class="mb-8 border-b border-gray-100 pb-5">
        <h1 class="text-3xl font-semibold text-gray-800 tracking-tight">代码语义变更分析</h1>
        <p class="mt-2 text-sm text-gray-500">基于抽象语法树与树编辑距离的深度语义识别</p>
    </div>

    <!-- 控制面板 -->
    <form hx-post="/api/analyze" hx-target="#analysis-container" hx-swap="innerHTML" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label for="repo_path" class="block text-sm font-medium text-gray-700">仓库路径</label>
                <input type="text" name="repo_path" id="repo_path" value="." class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-brand focus:ring-brand sm:text-sm px-4 py-2 border transition-colors">
            </div>
            <div>
                <label for="file_path" class="block text-sm font-medium text-gray-700">文件路径</label>
                <input type="text" name="file_path" id="file_path" value="main.go" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-brand focus:ring-brand sm:text-sm px-4 py-2 border transition-colors">
            </div>
            <div>
                <label for="old_commit" class="block text-sm font-medium text-gray-700">旧版本 Commit</label>
                <input type="text" name="old_commit" id="old_commit" value="HEAD~1" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-brand focus:ring-brand sm:text-sm px-4 py-2 border transition-colors">
            </div>
            <div>
                <label for="new_commit" class="block text-sm font-medium text-gray-700">新版本 Commit</label>
                <input type="text" name="new_commit" id="new_commit" value="HEAD" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-brand focus:ring-brand sm:text-sm px-4 py-2 border transition-colors">
            </div>
        </div>
        <div class="flex justify-end">
            <button type="submit" class="inline-flex items-center px-5 py-2.5 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-brand hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand transition-all">
                <svg class="-ml-1 mr-2 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                开始分析
            </button>
        </div>
    </form>
</div>

<!-- 分析结果展示区 -->
<div id="analysis-container" class="mt-8">
    <div class="text-center py-16 bg-white rounded-xl shadow-sm border border-gray-100">
        <svg class="mx-auto h-12 w-12 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
        </svg>
        <h3 class="mt-4 text-sm font-medium text-gray-900">暂无分析数据</h3>
        <p class="mt-1 text-sm text-gray-500">填写配置并点击开始分析</p>
    </div>
</div>
{{end}}
