{{define "progress"}}
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8" hx-ext="sse" sse-connect="/api/stream-progress?task_id={{.TaskID}}">
    <div class="mb-4">
        <h3 class="text-lg font-medium text-gray-900">正在分析语义差异...</h3>
        <p class="text-sm text-gray-500 mt-1">这可能需要几秒钟，请稍候。</p>
    </div>
    
    <div class="relative pt-1">
        <!-- 进度条背景 -->
        <div class="overflow-hidden h-2 mb-4 text-xs flex rounded bg-gray-100">
            <!-- 进度条本体（由 SSE 动态更新） -->
            <div sse-swap="progress-bar" hx-swap="outerHTML" style="width: 5%" class="shadow-none flex flex-col text-center whitespace-nowrap text-white justify-center bg-brand transition-all duration-500"></div>
        </div>
        <!-- 状态文本 -->
        <div sse-swap="progress-text" hx-swap="innerHTML" class="text-xs font-semibold inline-block text-brand">
            初始化解析器...
        </div>
    </div>
    
    <!-- 最终结果替换区 -->
    <div sse-swap="result" hx-swap="outerHTML" class="hidden"></div>
</div>
{{end}}
